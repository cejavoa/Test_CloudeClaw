<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #B4D7FF 0%, #9AC8FF 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      padding: 40px;
      max-width: 400px;
      width: 100%;
    }
    h1 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
      font-size: 2rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 5px;
      font-size: 1rem;
      transition: border-color 0.3s;
      font-family: inherit;
    }
    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #B4D7FF;
      box-shadow: 0 0 0 3px rgba(180, 215, 255, 0.1);
    }
    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 30px;
    }
    button[type="submit"],
    .back-link {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    button[type="submit"] {
      background: linear-gradient(135deg, #B4D7FF 0%, #9AC8FF 100%);
      color: white;
    }
    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(180, 215, 255, 0.4);
    }
    button[type="submit"]:active {
      transform: translateY(0);
    }
    .back-link {
      background: #f0f0f0;
      color: #333;
    }
    .back-link:hover {
      background: #e0e0e0;
      transform: translateY(-2px);
    }
    .back-link:active {
      transform: translateY(0);
    }
    .error-message {
      color: #d32f2f;
      font-size: 0.85rem;
      margin-top: 5px;
      display: none;
    }
    .form-group.error input {
      border-color: #d32f2f;
    }
    .form-group.error .error-message {
      display: block;
    }
    @media (max-width: 480px) {
      .login-container {
        padding: 30px 20px;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 25px;
      }
      .form-actions {
        flex-direction: column;
      }
      button[type="submit"],
      .back-link {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Login</h1>
    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="username">Username or Email</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter your username or email"
          required
        >
        <div class="error-message">Please enter your username or email</div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          required
        >
        <div class="error-message">Please enter your password</div>
      </div>

      <div class="form-actions">
        <button type="submit">Login</button>
        <a href="index.html" class="back-link">Back</a>
      </div>
    </form>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', function(event) {
      event.preventDefault();

      // Clear previous error states
      document.querySelectorAll('.form-group').forEach(group => {
        group.classList.remove('error');
      });

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      let isValid = true;

      // Validate username/email
      if (!username) {
        document.getElementById('username').parentElement.classList.add('error');
        isValid = false;
      }

      // Validate password
      if (!password) {
        document.getElementById('password').parentElement.classList.add('error');
        isValid = false;
      }

      if (isValid) {
        // Placeholder for backend authentication
        console.log('Form submitted with:', { username, password });
        alert('Login form submitted. Backend authentication service integration pending.');
        // TODO: Integrate with backend authentication API
        // Example: POST /api/auth/login with { username, password }
      }
    });
  </script>
</body>
</html>
