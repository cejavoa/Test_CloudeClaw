<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #FFFFFF 0%, #EF5350 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #333; /* Default text color */
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      padding: 40px; /* Added padding for content */
      text-align: center; /* Center content within container */
    }
    h1 {
      color: #EF5350; /* Consistent with section h2 in index.html */
      font-size: 2.5rem;
      margin-bottom: 20px;
    }
    h2 {
      color: #EF5350;
      font-size: 1.8rem;
      margin-top: 30px;
      margin-bottom: 15px;
    }
    p {
      color: #666;
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 10px;
    }
    .contact-info p {
      margin-bottom: 15px;
    }
    .cta-button {
      display: inline-block;
      background: white;
      color: #EF5350;
      padding: 14px 40px;
      text-decoration: none;
      border-radius: 5px;
      font-size: 1.1rem;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      border: none;
      margin-top: 30px;
    }
    .cta-button:hover {
      background: #D32F2F;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }
    .cta-button:active {
      transform: translateY(0);
    }
    /* Responsive adjustments */
    @media (max-width: 768px) {
      .container {
        padding: 30px 20px;
      }
      h1 {
        font-size: 2rem;
      }
      h2 {
        font-size: 1.5rem;
      }
      p {
        font-size: 1rem;
      }
      .cta-button {
        padding: 12px 30px;
        font-size: 1rem;
      }
    }
    @media (max-width: 480px) {
      .container {
        padding: 20px 15px;
      }
      h1 {
        font-size: 1.8rem;
      }
      h2 {
        font-size: 1.3rem;
      }
      p {
        font-size: 0.95rem;
      }
      .cta-button {
        padding: 10px 25px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 data-en="Contact Us" data-es="Contáctanos" data-fr="Nous Contacter">Contact Us</h1>
    <div class="contact-info">
      <p data-en="For general inquiries, please reach out to us:" data-es="Para consultas generales, por favor contáctanos:" data-fr="Pour toute question générale, veuillez nous contacter :">For general inquiries, please reach out to us:</p>
      <p><strong>Email:</strong> <a href="mailto:info@naturalhandsbalm.com" style="color: #EF5350; text-decoration: none;">info@naturalhandsbalm.com</a></p>
      <p><strong>Phone:</strong> <span data-en="+1 (555) 123-4567" data-es="+34 91 123 4567" data-fr="+33 1 23 45 67 89">+1 (555) 123-4567</span></p>
      <p><strong>Address:</strong> <span data-en="123 Balm Street, Suite 100, Skincare City, SC 12345, USA" data-es="Calle del Bálsamo 123, Oficina 100, Ciudad del Cuidado, CC 12345, España" data-fr="123 Rue du Baume, Bureau 100, Ville des Soins, CS 12345, France">123 Balm Street, Suite 100, Skincare City, SC 12345, USA</span></p>
    </div>
    <p data-en="We look forward to hearing from you!" data-es="¡Esperamos tener noticias tuyas!" data-fr="Nous avons hâte de vous lire !">We look forward to hearing from you!</p>
    <a href="index.html" class="cta-button" data-en="Back to Home" data-es="Volver al Inicio" data-fr="Retour à l'Accueil">Back to Home</a>
  </div>
</body>
</html>
